<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Fronte Meridionale</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="hero">
        <img src="lava-blue.jpg" alt="Lava Blue" />
        <h1>Welcome to Fronte Meridionale</h1>
        <button onclick="onLoginClick()">Login</button>
    </header>

    <section id="come-funziona">
        <h2>Come Funziona</h2>
        <p>Details about how it works...</p>
    </section>

    <section id="contributi">
        <h2>Contributi</h2>
        <p>Information about contributions...</p>
        <button onclick="onContributeMore()">Contribute More</button>
    </section>

    <section id="dashboard">
        <h2>Dashboard</h2>
        <div id="user-status"></div>
        <button onclick="onJoinCommunity()">Join our Community</button>
        <button onclick="onJoinVoter()">Join as Voter</button>
    </section>

    <footer>
        <img src="FRONTE_MERIDIONALE_LOGOVETTORIALE_NERO_page-0001.jpg" alt="Logo" />
        <p>Missione: Our mission statement...</p>
    </footer>
    <script>
        fetchUserStatus();
        renderDashboard();
    </script>
</body>
</html>
