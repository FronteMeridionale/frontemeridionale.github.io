<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fronte Meridionale — Partecipa alla comunità</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #f5f5f5;

  background-image:
    linear-gradient(rgba(0,0,0,0.84), rgba(0,0,0,0.93)),
    url("images/background.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* struttura base */
.container {
  width: 90%;
  max-width: 960px;
  margin: auto;
}

section {
  padding: 60px 0;
}

/* header */
.site-header {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.9);
  padding: 10px 0;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-logo img {
  height: 40px;
}

/* bottoni */
.btn {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-primary {
  background: #e10600;
  color: white;
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: white;
}

/* hero */
#hero {
  text-align: center;
  min-height: 100vh;
  display: flex;
  align-items: center;
}

.hero-title {
  font-size: 2.2rem;
}

.hero-cta {
  margin-top: 30px;
}

/* cards */
.card {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="header-logo">
      <img src="images/logo.png">
    </div>
    <button class="btn btn-primary" onclick="onLoginClick()">Partecipa</button>
  </div>
</header>

<section id="hero">
  <div class="container">
    <h1 class="hero-title">Partecipa alla comunità</h1>
    <p>Sostieni il progetto e accedi alla governance</p>

    <div class="hero-cta">
      <button class="btn btn-primary" onclick="onLoginClick()">Partecipa</button>
    </div>
  </div>
</section>

<section>
  <div class="container">
    <h2>Come funziona</h2>

    <div class="card">Entra</div>
    <div class="card">Contribuisci</div>
    <div class="card">Partecipa</div>
  </div>
</section>

<section>
  <div class="container">
    <h2>Livelli</h2>

    <div class="card">
      <h3>Sostenitore</h3>
      <p>15€</p>
      <button class="btn btn-secondary" onclick="onJoinCommunity()">Partecipa</button>
    </div>

    <div class="card">
      <h3>Elettore</h3>
      <p>50€</p>
      <button class="btn btn-primary" onclick="onJoinVoter()">Diventa elettore</button>
    </div>
  </div>
</section>

<section>
  <div class="container">
    <h2>Il tuo stato</h2>

    <div id="dashboard"></div>
  </div>
</section>

<script>
function onLoginClick() {
  alert("Login in arrivo");
}

function onJoinCommunity() {
  alert("Percorso sostenitore");
}

function onJoinVoter() {
  alert("Percorso elettore");
}
</script>

</body>
</html>
